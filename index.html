        let tiresData = [];

function normalizeNumber(v) {
  return (v ?? "").toString().trim().toUpperCase();
}

function numberExists(number, excludeUid = "") {
  const n = normalizeNumber(number);
  if (!n) return false;

  return tiresData.some(row => {
    const rowNum = normalizeNumber(row["#"]);
    const rowUid = (row["uid"] || row["UID"] || "").toString().trim();

    return rowNum === n && rowUid !== excludeUid;
  });
}
        async function fetchWithRetry(url, options = {}, retries = 3) {
    for (let i = 0; i < retries; i++) {
        try {
            const response = await fetch(url, options);
            if (!response.ok) throw new Error("HTTP " + response.status);
            return response;
        } catch (e) {
            if (i === retries - 1) throw e;
            await new Promise(r => setTimeout(r, 2000));
        }
    }
}
// ===== EDIT VALIDATION (no spaces, no symbols) =====
function isBlank(v) {
  return (v ?? "").toString().trim() === "";
}

// дозволено тільки букви/цифри (жодних пробілів і символів)
function isAlnumNoSpaces(v) {
  const s = (v ?? "").toString();
  return /^[A-Za-z0-9]+$/.test(s);
}

// Season: дозволяємо тільки ці значення (можна з /)
function isValidSeason(v) {
  const s = (v ?? "").toString().trim();
  return /^(A\/T|A\/S|A\/W|Wint|M\/T)$/i.test(s);
}

// повертає текст помилки або пусто
function validateEditValue(colName, rawValue) {
  const v = (rawValue ?? "").toString();

  // # може бути пустий
  if (colName === "#") {
    if (isBlank(v)) return "";
    if (!isAlnumNoSpaces(v.trim())) return "Remove spaces or symbols (only letters and numbers)";
    return "";
  }

  // обов'язковість для інших
  if (isBlank(v)) return "This field is required";

  // Season окремо
  if (colName === "Season") {
    if (!isValidSeason(v)) return "Season must be: A/T, A/S, A/W, Wint, M/T";
    return "";
  }

  // всі інші: тільки букви/цифри, без пробілів і символів
  if (!isAlnumNoSpaces(v.trim())) return "Remove spaces or symbols (only letters and numbers)";

  return "";
}

function setInlineError(inputEl, message) {
  inputEl.style.border = "";
  inputEl.title = "";

  const parent = inputEl.parentNode;
  if (!parent) return;

  let err = parent.querySelector(":scope > .error-message");
  if (!message) {
    if (err) err.remove();
    return;
  }

  inputEl.style.border = "2px solid red";
  inputEl.title = message;

  if (!err) {
    err = document.createElement("div");
    err.className = "error-message";
    parent.appendChild(err);
  }
  err.textContent = message;
}

function attachLiveValidation(inputEl, colName) {
  const run = () => {
    const msg = validateEditValue(colName, inputEl.value);
    setInlineError(inputEl, msg);
    return !msg;
  };
  inputEl.addEventListener("input", run);
  run(); // одразу перевірити при відкритті
  return run;
}

        // ===== MARKS (localStorage) =====
const MARKS_KEY = "tsp_marked_rows_v1";

function getMarksSet() {
    try {
        return new Set(JSON.parse(localStorage.getItem(MARKS_KEY) || "[]"));
    } catch {
        return new Set();
    }
}

function saveMarksSet(set) {
    localStorage.setItem(MARKS_KEY, JSON.stringify([...set]));
}

// Робимо стабільний ключ рядка (щоб позначка не зникала після оновлень)
function makeRowKey(row) {
  return row["uid"] || row["UID"] ||
    `${row["SIZE"]||""}|${row["Brand"]||""}|${row["location"]||""}|${row["Pieces"]||""}|${row["#"]||""}`;
}

function toggleMarkRow(tr, rowKey, btn) {
    const marks = getMarksSet();

    if (marks.has(rowKey)) {
        marks.delete(rowKey);
        tr.classList.remove("checked-row");
        btn.classList.remove("checked");
    } else {
        marks.add(rowKey);
        tr.classList.add("checked-row");
        btn.classList.add("checked");
    }

    saveMarksSet(marks);
}

function clearMarks() {
    localStorage.removeItem(MARKS_KEY);

    // прибираємо перекреслення відразу (без перезавантаження)
    document.querySelectorAll("#tireTable tbody tr").forEach(tr => tr.classList.remove("checked-row"));
    document.querySelectorAll(".mark-btn").forEach(b => b.classList.remove("checked"));
}

const condVal = (document.getElementById("condition").value || "").toLowerCase();
const modelEl = document.getElementById("model");
const modelVal = modelEl ? modelEl.value.trim() : "";

// Додаємо в formData завжди (щоб на Sheets писалось), але валідація тільки для New
formData["model"] = modelVal;

if (condVal === "new") {
    // очистити попередню помилку
    if (modelEl) {
        modelEl.style.border = "";
        const existingError = modelEl.nextElementSibling;
        if (existingError && existingError.classList.contains("error-message")) existingError.remove();

        if (!modelVal) {
            modelEl.style.border = "2px solid red";
            const msg = document.createElement("div");
            msg.className = "error-message";

            isValid = false;
        } else {
            // ті ж правила як ти хотів: тільки букви/цифри без пробілів/символів
            const pattern = /^[a-zA-Z0-9]+$/;
            if (!pattern.test(modelVal)) {

                const msg = document.createElement("div");
                msg.className = "error-message";
                msg.textContent = "Only letters and numbers allowed (no spaces or symbols)";
                modelEl.parentNode.insertBefore(msg, modelEl.nextSibling);
                isValid = false;
            }

        // live перевірка тільки коли поле показане (тобто New)
        if (!modelEl.dataset.liveBound) {
  modelEl.dataset.liveBound = "1";
  modelEl.addEventListener("input", () => { 
    if ((document.getElementById("condition").value || "").toLowerCase() !== "new") return;

    const val = modelEl.value.trim();
    const pattern = /^[a-zA-Z0-9]+$/;
    const next = modelEl.nextElementSibling;

    if (val && pattern.test(val)) {
      modelEl.style.border = "";
      if (next && next.classList.contains("error-message")) next.remove();
    } else {
      modelEl.style.border = "2px solid red";

        const msg = document.createElement("div");
        msg.className = "error-message";
        msg.textContent = !val

async function loadData(showLoader = true) {
  const table = document.getElementById("tireTable").getElementsByTagName("tbody")[0];

  try {
    if (showLoader) {
      document.getElementById("loader").style.display = "block";
    }

    let response = await fetchWithRetry(WEB_APP_URL + "?t=" + Date.now(), {});
    let text = await response.text();

    if (!text.trim().startsWith("[") && !text.trim().startsWith("{")) {
      throw new Error("Script returned: " + text);
    }

    let data = JSON.parse(text);
    tiresData = data;

    data.sort((a, b) => {
      let numA = a["#"] ? Number(a["#"]) : -Infinity;
      let numB = b["#"] ? Number(b["#"]) : -Infinity;
      return numB - numA;
    });

    table.innerHTML = "";

    data.forEach(row => {
      let tr = document.createElement("tr");

      ["SIZE", "Price", "Season", "Brand", "Pieces", "New/Used", "location", "#"].forEach(col => {
        let td = document.createElement("td");
        td.textContent = row[col] || "-";

        if (col === "Brand") {
          const model = row["Model"] || row["model"] || "";
          if (model) td.title = "Model: " + model;
        }

        td.setAttribute("data-col", col);
        tr.appendChild(td);
      });

      let actionTd = document.createElement("td");

      const rowKey = makeRowKey(row);
      const marks = getMarksSet();

      let markBtn = document.createElement("button");
      markBtn.className = "mark-btn";
      markBtn.type = "button";
      markBtn.textContent = "•";

      if (marks.has(rowKey)) {
        tr.classList.add("checked-row");
        markBtn.classList.add("checked");
      }

      markBtn.onclick = () => toggleMarkRow(tr, rowKey, markBtn);

      let editBtn = document.createElement("button");
      editBtn.textContent = "✏️";
      editBtn.onclick = () => editRow(tr, row);

      let deleteBtn = document.createElement("button");
      deleteBtn.textContent = "🗑";
      const uid = row["uid"] || row["UID"] || "";
      deleteBtn.onclick = () => deleteRowByUid(uid, tr);

      actionTd.appendChild(markBtn);
      actionTd.appendChild(editBtn);
      actionTd.appendChild(deleteBtn);

      tr.appendChild(actionTd);
      table.appendChild(tr);
    });

  } catch (e) {
    table.innerHTML = `<tr><td colspan="9" style="color:yellow;">Error loading table: ${e.message}</td></tr>`;
    console.error(e);
} finally {
    if (showLoader) {
      document.getElementById("loader").style.display = "none";
    }
  }
}

function filterTable() {
    let size = document.getElementById("searchSize").value.toLowerCase();
    let brand = document.getElementById("searchBrand").value.toLowerCase();
    let number = document.getElementById("searchNumber").value.toLowerCase();
    let pieces = document.getElementById("searchPieces").value.toLowerCase();
    let season = document.getElementById("searchSeason").value.toLowerCase();
    let condition = document.getElementById("searchCondition").value.toLowerCase();
    let location = document.getElementById("searchLocation").value.toLowerCase();

    let table = document.getElementById("tireTable").getElementsByTagName("tbody")[0];
    let rows = table.getElementsByTagName("tr");

    for (let i = 0; i < rows.length; i++) {
        let cols = rows[i].getElementsByTagName("td");
        if (cols.length > 0) {
            let sizeText = cols[0].textContent.toLowerCase();
            let priceText = cols[1].textContent.toLowerCase();
            let seasonText = cols[2].textContent.toLowerCase();
            let brandText = cols[3].textContent.toLowerCase();
            let piecesText = cols[4].textContent.toLowerCase();
            let conditionText = cols[5].textContent.toLowerCase();
            let locationText = cols[6].textContent.toLowerCase();
            let numberText = cols[7].textContent.toLowerCase();

            if (
                (size === "" || sizeText.includes(size)) &&
                (brand === "" || brandText.includes(brand)) &&
                (number === "" || numberText === number) &&
                (pieces === "" || piecesText.includes(pieces)) &&
                (season === "" || seasonText.includes(season)) &&
                (condition === "" || conditionText.includes(condition)) &&
                (location === "" || locationText.startsWith(location))
            ) {
                rows[i].style.display = "";
            } else {
                rows[i].style.display = "none";
            }
        }
    }
}

            let extraNewTireCharge = (condition === "new") ? quantity * 5 : 0;
        
            // Підраховуємо загальну суму

            // Розраховуємо GST (5%)
            let gst = fullPrice * 0.05;
            let totalPrice = fullPrice + gst;
        
            // Виводимо значення
            document.getElementById("fullPrice").textContent = fullPrice.toFixed(2);
            document.getElementById("gstPrice").textContent = gst.toFixed(2);
